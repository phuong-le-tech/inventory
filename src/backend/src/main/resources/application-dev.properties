# Development profile overrides

# Schema auto-update for development (Flyway disabled — Hibernate manages schema)
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Show SQL queries in logs
spring.jpa.show-sql=true

# Dev-only JWT secret (never use in production)
app.jwt.secret=dev-only-secret-key-minimum-32-characters-long
