spring.application.name=inventory-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=8080

# Database (common config - values from env vars)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Cookie Configuration
app.cookie.secure=${COOKIE_SECURE:false}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth2 - configured in application-oauth.properties when enabled
